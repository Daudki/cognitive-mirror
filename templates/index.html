<!DOCTYPE html>
<html>
<head>
    <title>Cognitive Mirror</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        textarea {
            width: 60%;
            height: 120px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        .box {
            margin-top: 20px;
            padding: 20px;
            background: #1e293b;
            display: inline-block;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🧠 Cognitive Mirror</h1>

    <form method="POST">
        <textarea name="text" placeholder="Enter human thought..."></textarea>
        <br>
        <button type="submit">Analyze Mind State</button>
    </form>

    {% if result %}
    <div class="box">
        <h2>Inference Output</h2>
        <p>Emotion: {{ result.emotion }}</p>
        <p>Sentiment: {{ result.sentiment }}</p>
        <p>Confidence: {{ result.confidence }}</p>
    </div>
    {% endif %}

</body>
</html>
